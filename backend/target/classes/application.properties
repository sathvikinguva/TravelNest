spring.application.name=booking-backend

# Load local .env values when running from backend folder
spring.config.import=optional:file:.env[.properties]

# MySQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/travel_booking?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:travel_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:travel_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# JWT Configuration (Base64-encoded secret)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Frontend OAuth callback
app.frontend.oauth-success-url=https://travel-nest-theta.vercel.app/oauth/callback

