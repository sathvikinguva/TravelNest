spring.application.name=booking-backend

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/travel_booking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=travel_user
spring.datasource.password=travel_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# JWT Configuration (Base64-encoded secret)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Frontend OAuth callback
app.frontend.oauth-success-url=http://localhost:5173/oauth/callback

